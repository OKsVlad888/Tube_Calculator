<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HUD Background</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000d0d;font-family:Courier New, monospace}
:root{--c:#00e5cc;--warn:#ffaa00;--alert:#ff3344}
body.hud-alert{--c:var(--alert)}
body.hud-warn{--c:var(--warn)}

/* Global scanlines */
.scanlines{position:absolute;inset:0;background:repeating-linear-gradient(to bottom,rgba(0,229,204,.03) 0,rgba(0,229,204,.03) 1px,transparent 1px,transparent 3px);pointer-events:none}

/* Top waveform */
.wave{position:absolute;top:10px;left:15%;right:2%;height:90px;border:1px solid var(--c)}
canvas{width:100%;height:100%}

/* Left data */
.left{position:absolute;top:10px;left:10px;width:220px;border:1px solid var(--c);padding:6px;color:var(--c)}

/* Alert frame */
.alert{position:absolute;inset:8px;border:2px solid var(--c);box-shadow:0 0 20px var(--c);pointer-events:none}
.banner{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:var(--c);letter-spacing:2px}

</style>
</head>
<body>
<div class="scanlines"></div>
<div class="alert"></div>
<div class="banner">SYSTEM HUD ACTIVE</div>

<div class="left">DATA CHANNELS<br><span id="d1">82</span><br><span id="d2">47</span></div>

<div class="wave"><canvas id="w"></canvas></div>

<script>
const c=document.getElementById('w'),x=c.getContext('2d');let t=0;
function draw(){
  c.width=c.offsetWidth*devicePixelRatio;
  c.height=c.offsetHeight*devicePixelRatio;
  x.clearRect(0,0,c.width,c.height);
  x.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c');
  x.beginPath();for(let i=0;i<c.width;i++){let y=c.height/2+Math.sin(i/60+t)*25;x.lineTo(i,y)}x.stroke();t+=.05;requestAnimationFrame(draw)
}
draw();

window.addEventListener('message',e=>{
 if(!e.data||!e.data.calc)return;
 if(e.data.calc.Status==='ALERT')document.body.className='hud-alert';
 else if(e.data.calc.Status==='LIMIT')document.body.className='hud-warn';
 else document.body.className='';
});
</script>
</body>
</html>
